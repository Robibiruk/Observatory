[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — route all paths to index.html so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (served on every response via Netlify's CDN).
[[headers]]
  for = "/*"
  [headers.values]
    # Enforce HTTPS for 1 year; cover subdomains; eligible for the HSTS preload list.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Isolate this document's browsing context from cross-origin openers.
    Cross-Origin-Opener-Policy = "same-origin"
    # Only same-origin documents may embed our resources.
    Cross-Origin-Resource-Policy = "same-origin"
    # Stop MIME sniffing.
    X-Content-Type-Options = "nosniff"

    # Block framing (clickjacking). CSP frame-ancestors is the modern equivalent;
    # X-Frame-Options is the legacy fallback for older browsers.
    X-Frame-Options = "SAMEORIGIN"
    # Limit how much referrer info leaves the site.
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Content Security Policy. External assets are limited to same-origin build
    # files plus Google Fonts (stylesheet host + font file host). No inline
    # scripts (Vite emits external module chunks), so script-src stays strict.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' fonts.googleapis.com 'unsafe-inline'; font-src 'self' fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'"

    # Permissions Policy: disable powerful browser features this site doesn't use.
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=(), browsing-topics=(), payment=(), usb=(), publickey-credentials-get=(), screen-wake-lock=()"
